{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold">Edit Informasi User</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('edit_user', id=user.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" name="nama_lengkap" value="{{ user.nama_lengkap }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role Akses</label>
                        <select class="form-select" name="role" required>
                            <option value="admin" {{ 'selected' if user.role == 'admin' }}>Admin</option>
                            <option value="dosen" {{ 'selected' if user.role == 'dosen' }}>Dosen</option>
                            <option value="mahasiswa" {{ 'selected' if user.role == 'mahasiswa' }}>Mahasiswa</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ganti Password <small class="text-muted">(Kosongkan jika tidak ingin ganti)</small></label>
                        <input type="password" class="form-control" name="password">
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{{ url_for('kelola_user') }}" class="btn btn-secondary px-4">Batal</a>
                        <button type="submit" class="btn btn-primary px-4">Simpan Perubahan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
