{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-video me-2"></i>Manajemen Video</h5>
        <a href="{{ url_for('add_video') }}" class="btn btn-primary btn-sm rounded-pill px-3">
            + Tambah Video
        </a>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th width="5%">No</th>
                        <th width="30%">Judul Video</th>
                        <th>YouTube ID</th>
                        <th>Keterangan</th>
                        <th width="10%">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    {% for v in videos %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td><strong>{{ v.judul }}</strong></td>
                        <td><code>{{ v.youtube_id }}</code></td>
                        <td><small class="text-muted">{{ v.keterangan }}</small></td>
                        <td>
                            <a href="{{ url_for('delete_video', id=v.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('Hapus video ini?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
