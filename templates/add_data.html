{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">Tambah Berita Baru</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_data') }}" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-3">
                        <label for="judul" class="form-label">Judul Berita</label>
                        <input type="text" class="form-control" id="judul" name="judul" required>
                    </div>

                    <div class="mb-3">
                        <label for="penulis" class="form-label">Penulis</label>
                        <input type="text" class="form-control" id="penulis" name="penulis" required>
                    </div>

                    <div class="mb-3">
                        <label for="konten" class="form-label">Konten Berita</label>
                        <textarea class="form-control" id="konten" name="konten" rows="5" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Gambar Unggulan</label>
                        <input type="file" class="form-control" name="gambar" accept="image/*">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Kategori Berita</label>
                        <select class="form-select" name="id_kategori" required>
                            <option value="" selected disabled>-- Pilih Kategori --</option>
                            {% for k in kategori %}
                            <option value="{{ k.id }}">{{ k.nama_kategori }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Hashtag (Pilih beberapa)</label>
                        <div class="border p-3 rounded bg-light">
                            {% for h in hashtag %}
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="hashtags" value="{{ h.id }}" id="tag{{ h.id }}">
                                <label class="form-check-label" for="tag{{ h.id }}">{{ h.nama_hashtag }}</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Batal</a>
                        <button type="submit" class="btn btn-primary">Simpan Berita</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
