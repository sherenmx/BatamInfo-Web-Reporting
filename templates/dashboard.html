{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0">Data Berita</h5>
        <a href="{{ url_for('add_data') }}" class="btn btn-primary btn-sm">
            + Tambah Berita
        </a>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th width="5%">No</th>
                        <th>Judul Berita</th>
                        <th width="20%">Penulis</th>
                        <th width="20%">Tanggal</th>
                        <th width="15%">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in berita %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ item.judul }}</td>
                        <td>{{ item.penulis }}</td>
                        <td>{{ item.tanggal }}</td>
                        <td>
                            <a href="{{ url_for('edit_data', id=item.id) }}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="{{ url_for('delete_data', id=item.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('Apakah Anda yakin ingin menghapus berita ini?')">Hapus</a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="text-center">Belum ada data berita.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
